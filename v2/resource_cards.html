<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin: 30px 0 15px;
            font-size: 20px;
            color: #333;
        }

        h2:first-child {
            margin-top: 10px;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto 40px;
        }

        .card {
            background: white;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 16px;
            aspect-ratio: 2.5 / 3.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .stock-badge {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 8px;
        }

        .stock-ticket {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            padding: 18px 24px;
            border-radius: 6px;
            border: 2px solid;
        }

        /* Notched corners for ticket feel */
        .stock-ticket::before,
        .stock-ticket::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            border: 2px solid;
        }
        .stock-ticket::before {
            left: -9px;
            top: 50%;
            transform: translateY(-50%);
        }
        .stock-ticket::after {
            right: -9px;
            top: 50%;
            transform: translateY(-50%);
        }

        .stock-ticket.blue {
            background: rgba(41, 128, 185, 0.1);
            border-color: #2980b9;
        }
        .stock-ticket.blue::before,
        .stock-ticket.blue::after { border-color: #2980b9; }

        .stock-ticket.red {
            background: rgba(192, 57, 43, 0.1);
            border-color: #c0392b;
        }
        .stock-ticket.red::before,
        .stock-ticket.red::after { border-color: #c0392b; }

        .stock-ticket.yellow {
            background: rgba(212, 160, 23, 0.12);
            border-color: #d4a017;
        }
        .stock-ticket.yellow::before,
        .stock-ticket.yellow::after { border-color: #d4a017; }

        .stock-ticket.black {
            background: rgba(26, 26, 46, 0.08);
            border-color: #1a1a2e;
        }
        .stock-ticket.black::before,
        .stock-ticket.black::after { border-color: #1a1a2e; }

        .card-color {
            font-size: 36px;
            font-weight: 900;
            text-align: center;
        }

        .card-color.blue { color: #2980b9; }
        .card-color.red { color: #c0392b; }
        .card-color.yellow { color: #d4a017; }
        .card-color.black { color: #1a1a2e; }

        .card-type {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .card-ability {
            font-size: 13px;
            color: #333;
            text-align: center;
            padding: 10px 8px;
            border-top: 1px solid #ddd;
            margin-top: 8px;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        .card-ability.empty {
            visibility: hidden;
        }

        .card-ability .icon {
            margin-right: 4px;
        }

        @media print {
            @page {
                size: portrait;
                margin: 0.3in;
            }

            body {
                background: white;
                margin: 0;
                padding: 0;
            }

            h2 {
                margin: 20px 0 10px;
                font-size: 16px;
            }

            .cards-container {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                width: 100%;
                max-width: none;
                margin-bottom: 24px;
            }

            .card {
                width: 100%;
                box-shadow: none;
                page-break-inside: avoid;
                padding: 10px;
            }

            .card-color {
                font-size: 28px;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .stock-ticket {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                padding: 14px 18px;
            }

            .stock-ticket::before,
            .stock-ticket::after {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .card-ability {
                font-size: 11px;
                padding: 6px 4px;
            }
        }
    </style>
</head>
<body>

<script>
const colors = [
    { name: 'Blue', css: 'blue' },
    { name: 'Red', css: 'red' },
    { name: 'Yellow', css: 'yellow' },
    { name: 'Black', css: 'black' },
];

const cardTypes = [
    { type: 'plain', ability: '', cssClass: 'empty' },
    { type: 'plain', ability: '', cssClass: 'empty' },
    { type: 'hot', ability: 'When sold, increase investigation by 1.', cssClass: '' },
    { type: 'hot', ability: 'When sold, increase investigation by 1.', cssClass: '' },
    { type: 'stock-up', ability: 'When gained, increase any stock by 1.', cssClass: '' },
    { type: 'stock-down', ability: 'When gained, decrease any stock by 1.', cssClass: '' },
    { type: 'hype', abilityFn: (color) => `When gained, ${color} stock +1. When sold, ${color} stock −1.`, cssClass: '' },
    { type: 'goal', ability: 'When gained, draw a goal card.', cssClass: '' },
];

let html = '';

for (const color of colors) {
    html += '<div class="cards-container">';

    for (const card of cardTypes) {
        const abilityText = card.abilityFn ? card.abilityFn(color.name) : card.ability;
        const abilityClass = abilityText === '' ? 'empty' : card.cssClass;

        html += `
        <div class="card">
            <div class="card-type">Stock</div>
            <div class="stock-badge">
                <div class="stock-ticket ${color.css}">
                    <div class="card-color ${color.css}">${color.name}</div>
                </div>
            </div>
            <div class="card-ability ${abilityClass}">${abilityText}</div>
        </div>`;
    }

    html += '</div>';
}

document.body.innerHTML = html;
</script>

</body>
</html>
