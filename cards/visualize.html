<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insider Trading V4 - Card Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background: #f5f0e8;
            padding: 20px;
            color: #2c2c2c;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto 30px;
            padding: 20px;
            background: #fff;
            border: 2px solid #8b7355;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls h1 {
            font-size: 22px;
            color: #4a3728;
            width: 100%;
            margin-bottom: 5px;
        }

        .controls label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
            padding: 6px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fafafa;
        }

        .controls label:hover { background: #f0ebe3; }
        .controls input[type="checkbox"] { cursor: pointer; }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto 40px;
        }

        .card {
            background: white;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 14px;
            aspect-ratio: 2.5 / 3.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
            position: relative;
        }

        .card-header {
            font-size: 16px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Stock card styles */
        .stock-badge {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 8px;
        }

        .stock-ticket {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            padding: 18px 24px;
            border-radius: 6px;
            border: 2px solid;
        }

        .stock-ticket::before,
        .stock-ticket::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            border: 2px solid;
        }
        .stock-ticket::before { left: -9px; top: 50%; transform: translateY(-50%); }
        .stock-ticket::after { right: -9px; top: 50%; transform: translateY(-50%); }

        .stock-ticket.Blue { background: rgba(41, 128, 185, 0.1); border-color: #2980b9; }
        .stock-ticket.Blue::before, .stock-ticket.Blue::after { border-color: #2980b9; }
        .stock-ticket.Orange { background: rgba(230, 126, 34, 0.1); border-color: #e67e22; }
        .stock-ticket.Orange::before, .stock-ticket.Orange::after { border-color: #e67e22; }
        .stock-ticket.Yellow { background: rgba(212, 160, 23, 0.12); border-color: #d4a017; }
        .stock-ticket.Yellow::before, .stock-ticket.Yellow::after { border-color: #d4a017; }
        .stock-ticket.Purple { background: rgba(142, 68, 173, 0.1); border-color: #8e44ad; }
        .stock-ticket.Purple::before, .stock-ticket.Purple::after { border-color: #8e44ad; }
        .stock-ticket.Wild { background: rgba(80, 80, 80, 0.08); border-color: #555; }
        .stock-ticket.Wild::before, .stock-ticket.Wild::after { border-color: #555; }

        .card-color {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
        }

        .card-color.Blue { color: #2980b9; }
        .card-color.Orange { color: #e67e22; }
        .card-color.Yellow { color: #d4a017; }
        .card-color.Purple { color: #8e44ad; }
        .card-color.Wild {
            background: linear-gradient(90deg,#2980b9,#e67e22,#d4a017,#8e44ad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .special-name {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4a3728;
            text-align: center;
        }

        .card-ability {
            font-size: 19px;
            color: #333;
            text-align: center;
            padding: 8px 6px;
            border-top: 1px solid #ddd;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            font-style: italic;
            width: 100%;
        }

        .card-ability.empty { visibility: hidden; }

        /* Action card styles */
        .action-name {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #2c2c2c;
            padding: 0 4px;
        }

        .action-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 8px;
            width: 100%;
        }

        .action-desc {
            font-size: 20px;
            text-align: center;
            line-height: 1.5;
            color: #444;
        }

        .action-tag {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: #333;
            padding: 3px 10px;
            border-radius: 10px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Insider Tip card styles */
        .tip-name {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #c0392b;
            text-align: center;
        }

        .tip-body {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tip-text {
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            color: #2c2c2c;
            line-height: 1.5;
        }

        /* Goal card styles */
        .goal-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .goal-cards-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .card-symbol {
            width: 40px;
            height: 56px;
            border-radius: 5px;
            border: 2px solid;
            display: inline-block;
        }

        .card-symbol.Blue { background-color: #3498db; border-color: #2980b9; }
        .card-symbol.Orange { background-color: #e67e22; border-color: #d35400; }
        .card-symbol.Yellow { background-color: #f1c40f; border-color: #d4a017; }
        .card-symbol.Purple { background-color: #9b59b6; border-color: #8e44ad; }

        .goal-plus {
            font-size: 22px;
            font-weight: 700;
            color: #888;
        }

        .goal-reward {
            font-size: 20px;
            text-align: center;
            color: #444;
            line-height: 1.4;
        }

        /* Simple text card (loan / hot tip) */
        .plain-name {
            font-size: 22px;
            font-weight: 900;
            text-align: center;
            color: #4a3728;
        }

        .plain-body {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plain-text {
            font-size: 20px;
            text-align: center;
            line-height: 1.5;
            color: #444;
        }

        .section { display: none; }
        .section.visible { display: block; }

        @media print {
            @page { size: portrait; margin: 0.3in; }
            body { background: white; padding: 0; }
            .controls { display: none; }
            .section { display: block !important; }
            .cards-container {
                grid-template-columns: repeat(4, 1fr);
                gap: 14px;
                width: 100%;
                max-width: none;
            }
            .card {
                box-shadow: none;
                page-break-inside: avoid;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .stock-ticket, .stock-ticket::before, .stock-ticket::after,
            .card-symbol, .action-tag {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="controls">
    <h1>Insider Trading V4 - Card Visualizer</h1>
    <label><input type="checkbox" id="toggle-stock-basic" checked> Basic Stock Cards (16)</label>
    <label><input type="checkbox" id="toggle-stock-special" checked> Special Stock Cards (16)</label>
    <label><input type="checkbox" id="toggle-stock-wild" checked> Wild Shares (4)</label>
    <label><input type="checkbox" id="toggle-action" checked> Action Cards (11)</label>
    <label><input type="checkbox" id="toggle-insider" checked> Insider Tip Cards (16)</label>
    <label><input type="checkbox" id="toggle-goal" checked> Goal Cards (14)</label>
    <label><input type="checkbox" id="toggle-loan" checked> Loan Cards (6)</label>
    <label><input type="checkbox" id="toggle-peek" checked> Hot Tip Cards (6)</label>
</div>

<div id="content"></div>

<script>
const SPECIAL_NAMES = {
  extra_up: "Boom",
  other_up: "Tip-Off",
  peek_buy: "Scout",
  peek_sell: "Informant",
  wild: "Wild Share"
};

function buildStockCards() {
  const colors = ["Blue", "Orange", "Yellow", "Purple"];
  const cards = [];
  for (const color of colors) {
    for (let i = 0; i < 4; i++) cards.push({ color, type: "blank" });
    cards.push({ color, type: "extra_up", ability: `When bought, ${color} rises an extra +1 (${color} rises +2 total).` });
    cards.push({ color, type: "other_up", ability: "When bought, raise a different color of your choice by +1." });
    cards.push({ color, type: "peek_buy", ability: "When bought, look at the top Insider Tip card." });
    cards.push({ color, type: "peek_sell", ability: "When sold, look at the top Insider Tip card." });
  }
  for (let i = 0; i < 4; i++) {
    cards.push({ color: "Wild", type: "wild", ability: "No cash value and cannot be sold. When claiming a Goal, may count as one stock of any one color, then is discarded." });
  }
  return cards;
}
const stockCards = buildStockCards();

const actionCards = [
  { name: "Tipster's Choice", description: "Draw 2 cards from the main deck, keep 1, return the other to the bottom", persistent: false },
  { name: "Corner the Market", description: "Take any one face-up market stock for free (not bought)", persistent: false },
  { name: "Pump and Dump", description: "Sell 1 stock at double its current price (that color still falls -1)", persistent: false },
  { name: "The Squeeze", description: "Raise one stock +2 OR lower one stock -2", persistent: false },
  { name: "Wild Speculation", description: "Reveal the top main-deck card; if it is a colored stock, raise or lower that color by 3", persistent: false },
  { name: "Preferred Bidder", description: "For rest of game, when you tie the winning bid, you win", persistent: true },
  { name: "Stock Certificate Forgery", description: "Claim any one goal using one fewer stock than required", persistent: false },
  { name: "Hostile Takeover", description: "Look at another player's hand, take 1 stock of your choice. They receive $6", persistent: false },
  { name: "Rumor Mill", description: "Adjust every stock by +1 or -1", persistent: false },
  { name: "Inside Track", description: "Look at the top 2 Insider Tip cards and return them in any order", persistent: false },
  { name: "Wiretap", description: "Look at the top 2 Insider Tip cards and return them in any order", persistent: false },
];

const goalCards = [
  { id: 1, goal: "2 Blue", reward: "Gain $4", requirements: { Blue: 2 } },
  { id: 2, goal: "2 Orange", reward: "Adjust any one stock by ±2", requirements: { Orange: 2 } },
  { id: 3, goal: "2 Yellow", reward: "Set any one stock to exactly $6", requirements: { Yellow: 2 } },
  { id: 4, goal: "2 Purple", reward: "Look at the top 2 Insider Tip cards", requirements: { Purple: 2 } },
  { id: 5, goal: "3 Blue", reward: "Steal $3 from each other player", requirements: { Blue: 3 } },
  { id: 6, goal: "3 Orange", reward: "Sell any number of stocks, gain +$3 per stock sold", requirements: { Orange: 3 } },
  { id: 7, goal: "3 Yellow", reward: "Gain $7", requirements: { Yellow: 3 } },
  { id: 8, goal: "3 Purple", reward: "Adjust every stock by +1 or -1 (choose per stock)", requirements: { Purple: 3 } },
  { id: 9, goal: "2 Blue + 2 Orange", reward: "Gain $8", requirements: { Blue: 2, Orange: 2 } },
  { id: 10, goal: "2 Blue + 2 Yellow", reward: "Adjust any one stock by ±4", requirements: { Blue: 2, Yellow: 2 } },
  { id: 11, goal: "2 Blue + 2 Purple", reward: "Adjust any one stock by +3 and another stock by -3", requirements: { Blue: 2, Purple: 2 } },
  { id: 12, goal: "2 Orange + 2 Yellow", reward: "Swap one of your stock cards with a face-up market card", requirements: { Orange: 2, Yellow: 2 } },
  { id: 13, goal: "2 Orange + 2 Purple", reward: "Draw 3 cards from the main deck, keep 1, return the others to the bottom", requirements: { Orange: 2, Purple: 2 } },
  { id: 14, goal: "2 Yellow + 2 Purple", reward: "At the end of the game, gain $10", requirements: { Yellow: 2, Purple: 2 } },
];

const insiderTipCards = [
  { type: "crash", text: "Blue value halved (round down)" },
  { type: "crash", text: "Blue value halved (round down)" },
  { type: "crash", text: "Orange value halved (round down)" },
  { type: "crash", text: "Orange value halved (round down)" },
  { type: "crash", text: "Yellow value halved (round down)" },
  { type: "crash", text: "Yellow value halved (round down)" },
  { type: "crash", text: "Purple value halved (round down)" },
  { type: "crash", text: "Purple value halved (round down)" },
  { type: "surge", text: "Blue +4" },
  { type: "surge", text: "Orange +4" },
  { type: "surge", text: "Yellow +4" },
  { type: "surge", text: "Purple +4" },
  { type: "slump", text: "Blue -2 / Orange -2" },
  { type: "slump", text: "Orange -2 / Purple -2" },
  { type: "slump", text: "Purple -2 / Yellow -2" },
  { type: "slump", text: "Yellow -2 / Blue -2" },
];

const loanCards = Array.from({ length: 6 }, () => ({
  name: "Bank Loan",
  text: "Take $10 from the bank now. Worth -$12 at game end.",
}));

const peekCards = Array.from({ length: 6 }, () => ({
  name: "Hot Tip",
  text: "Single-use: look at the top Insider Tip card, then discard this card.",
}));

function renderStockCards(showBasic, showSpecial, showWild) {
    let html = '<div class="cards-container">';
    const filtered = stockCards.filter(c =>
        (showBasic && c.type === 'blank') ||
        (showSpecial && c.type !== 'blank' && c.type !== 'wild') ||
        (showWild && c.type === 'wild')
    );
    for (const card of filtered) {
        const abilityText = card.ability || '';
        const abilityClass = abilityText ? '' : 'empty';
        const nameHtml = card.type !== 'blank'
            ? `<div class="special-name">${SPECIAL_NAMES[card.type]}</div>` : '';
        html += `
        <div class="card">
            <div class="card-header">Stock</div>
            ${nameHtml}
            <div class="stock-badge">
                <div class="stock-ticket ${card.color}">
                    <div class="card-color ${card.color}">${card.color}</div>
                </div>
            </div>
            <div class="card-ability ${abilityClass}">${abilityText}</div>
        </div>`;
    }
    html += '</div>';
    return html;
}

function renderActionCards() {
    let html = '';
    for (const card of actionCards) {
        const tagHtml = card.persistent ? '<div class="action-tag">Persistent</div>' : '';
        html += `
        <div class="card">
            <div class="card-header">Action</div>
            <div class="action-name">${card.name}</div>
            <div class="action-body">
                <div class="action-desc">${card.description}</div>
                ${tagHtml}
            </div>
        </div>`;
    }
    return html;
}

function renderInsiderTipCards() {
    let html = '';
    for (const card of insiderTipCards) {
        html += `
        <div class="card">
            <div class="card-header">Insider Tip</div>
            <div class="tip-name">${card.type.replace('_', ' ')}</div>
            <div class="tip-body">
                <div class="tip-text">${card.text}</div>
            </div>
        </div>`;
    }
    return html;
}

function renderGoalCards() {
    let html = '';
    for (const card of goalCards) {
        let symbolsHtml = '';
        const colors = Object.entries(card.requirements);
        colors.forEach(([color, count], colorIdx) => {
            if (colorIdx > 0) symbolsHtml += '<span class="goal-plus">+</span>';
            for (let i = 0; i < count; i++) {
                symbolsHtml += `<div class="card-symbol ${color}"></div>`;
            }
        });
        html += `
        <div class="card">
            <div class="card-header">Goal</div>
            <div class="goal-body">
                <div class="goal-cards-row">${symbolsHtml}</div>
                <div class="goal-reward">${card.reward}</div>
            </div>
        </div>`;
    }
    return html;
}

function renderPlainCards(cards, header) {
    let html = '';
    for (const card of cards) {
        html += `
        <div class="card">
            <div class="card-header">${header}</div>
            <div class="plain-body">
                <div>
                    <div class="plain-name">${card.name}</div>
                    <div class="plain-text">${card.text}</div>
                </div>
            </div>
        </div>`;
    }
    return html;
}

function render() {
    const content = document.getElementById('content');
    let html = '';

    const showBasic = document.getElementById('toggle-stock-basic').checked;
    const showSpecial = document.getElementById('toggle-stock-special').checked;
    const showWild = document.getElementById('toggle-stock-wild').checked;
    if (showBasic || showSpecial || showWild) {
        html += `<div class="section visible">${renderStockCards(showBasic, showSpecial, showWild)}</div>`;
    }
    let otherCards = '';
    if (document.getElementById('toggle-action').checked) otherCards += renderActionCards();
    if (document.getElementById('toggle-insider').checked) otherCards += renderInsiderTipCards();
    if (document.getElementById('toggle-goal').checked) otherCards += renderGoalCards();
    if (document.getElementById('toggle-loan').checked) otherCards += renderPlainCards(loanCards, 'Loan');
    if (document.getElementById('toggle-peek').checked) otherCards += renderPlainCards(peekCards, 'Hot Tip');
    if (otherCards) {
        html += `<div class="section visible"><div class="cards-container">${otherCards}</div></div>`;
    }
    content.innerHTML = html;
}

render();

document.querySelectorAll('.controls input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', render);
});

const params = new URLSearchParams(window.location.search);
const showParam = params.get('show');
if (showParam) {
    const types = showParam.split(',');
    const allToggles = ['stock-basic', 'stock-special', 'stock-wild', 'action', 'insider', 'goal', 'loan', 'peek'];
    for (const t of allToggles) {
        const shown = types.includes(t) || (t.startsWith('stock-') && types.includes('stock'));
        document.getElementById(`toggle-${t}`).checked = shown;
    }
    render();
}
</script>

</body>
</html>
