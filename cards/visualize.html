<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insider Trading - Card Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background: #f5f0e8;
            padding: 20px;
            color: #2c2c2c;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto 30px;
            padding: 20px;
            background: #fff;
            border: 2px solid #8b7355;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls h1 {
            font-size: 22px;
            color: #4a3728;
            width: 100%;
            margin-bottom: 5px;
        }

        .controls label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
            padding: 6px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fafafa;
        }

        .controls label:hover { background: #f0ebe3; }
        .controls input[type="checkbox"] { cursor: pointer; }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto 40px;
        }

        .card {
            background: white;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 14px;
            aspect-ratio: 2.5 / 3.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
            position: relative;
        }

        .card-header {
            font-size: 16px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Stock card styles */
        .stock-badge {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 8px;
        }

        .stock-ticket {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            padding: 18px 24px;
            border-radius: 6px;
            border: 2px solid;
        }

        .stock-ticket::before,
        .stock-ticket::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            border: 2px solid;
        }
        .stock-ticket::before { left: -9px; top: 50%; transform: translateY(-50%); }
        .stock-ticket::after { right: -9px; top: 50%; transform: translateY(-50%); }

        .stock-ticket.Blue { background: rgba(41, 128, 185, 0.1); border-color: #2980b9; }
        .stock-ticket.Blue::before, .stock-ticket.Blue::after { border-color: #2980b9; }
        .stock-ticket.Orange { background: rgba(230, 126, 34, 0.1); border-color: #e67e22; }
        .stock-ticket.Orange::before, .stock-ticket.Orange::after { border-color: #e67e22; }
        .stock-ticket.Yellow { background: rgba(212, 160, 23, 0.12); border-color: #d4a017; }
        .stock-ticket.Yellow::before, .stock-ticket.Yellow::after { border-color: #d4a017; }
        .stock-ticket.Purple { background: rgba(142, 68, 173, 0.1); border-color: #8e44ad; }
        .stock-ticket.Purple::before, .stock-ticket.Purple::after { border-color: #8e44ad; }

        .card-color {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
        }

        .card-color.Blue { color: #2980b9; }
        .card-color.Orange { color: #e67e22; }
        .card-color.Yellow { color: #d4a017; }
        .card-color.Purple { color: #8e44ad; }

        .card-ability {
            font-size: 22px;
            color: #333;
            text-align: center;
            padding: 8px 6px;
            border-top: 1px solid #ddd;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            font-style: italic;
        }

        .card-ability.empty { visibility: hidden; }

        /* Action card styles */
        .action-name {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #2c2c2c;
            padding: 0 4px;
        }

        .action-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 8px;
            width: 100%;
        }

        .action-desc {
            font-size: 22px;
            text-align: center;
            line-height: 1.5;
            color: #444;
        }

        .action-tag {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: #333;
            padding: 3px 10px;
            border-radius: 10px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-tag.todo {
            background: #e67e22;
        }

        /* Crisis card styles */
        .crisis-name {
            font-size: 22px;
            font-weight: 900;
            color: #c0392b;
            text-align: center;
        }

        .crisis-body {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .crisis-effect {
            font-size: 22px;
            text-align: center;
            line-height: 1.5;
            color: #444;
        }

        /* Goal card styles */
        .goal-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .goal-cards-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .card-symbol {
            width: 40px;
            height: 56px;
            border-radius: 5px;
            border: 2px solid;
            display: inline-block;
        }

        .card-symbol.Blue { background-color: #3498db; border-color: #2980b9; }
        .card-symbol.Orange { background-color: #e67e22; border-color: #d35400; }
        .card-symbol.Yellow { background-color: #f1c40f; border-color: #d4a017; }
        .card-symbol.Purple { background-color: #9b59b6; border-color: #8e44ad; }

        .goal-plus {
            font-size: 22px;
            font-weight: 700;
            color: #888;
        }

        .goal-reward {
            font-size: 22px;
            text-align: center;
            color: #444;
            line-height: 1.4;
        }

        /* Market manipulation card styles */
        .manipulation-body {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .manipulation-change {
            font-size: 26px;
            font-weight: 900;
            text-align: center;
            color: #2c2c2c;
            line-height: 1.6;
        }

        .section { display: none; }
        .section.visible { display: block; }

        @media print {
            @page { size: portrait; margin: 0.3in; }
            body { background: white; padding: 0; }
            .controls { display: none; }
            .section { display: block !important; }
            .cards-container {
                grid-template-columns: repeat(4, 1fr);
                gap: 14px;
                width: 100%;
                max-width: none;
            }
            .card {
                box-shadow: none;
                page-break-inside: avoid;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .stock-ticket, .stock-ticket::before, .stock-ticket::after,
            .card-symbol, .action-tag {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="controls">
    <h1>Insider Trading - Card Visualizer</h1>
    <label><input type="checkbox" id="toggle-stock" checked> Stock Cards (32)</label>
    <label><input type="checkbox" id="toggle-action" checked> Action Cards (10)</label>
    <label><input type="checkbox" id="toggle-crisis" checked> Crisis Cards (2)</label>
    <label><input type="checkbox" id="toggle-manipulation" checked> Market Manipulation (14)</label>
    <label><input type="checkbox" id="toggle-goal" checked> Goal Cards (14)</label>
</div>

<div id="content"></div>

<script>
const stockCards = [
  { color: "Blue", type: "blank" },
  { color: "Blue", type: "blank" },
  { color: "Blue", type: "blank" },
  { color: "Blue", type: "blank" },
  { color: "Blue", type: "stock_up", ability: "When gained, increase any stock by 1" },
  { color: "Blue", type: "stock_down", ability: "When gained, decrease any stock by 1" },
  { color: "Blue", type: "hype", ability: "When gained, Blue +1. When sold, Blue -1" },
  { color: "Blue", type: "insider", ability: "When sold, draw an unused Insider Tip Action" },
  { color: "Orange", type: "blank" },
  { color: "Orange", type: "blank" },
  { color: "Orange", type: "blank" },
  { color: "Orange", type: "blank" },
  { color: "Orange", type: "stock_up", ability: "When gained, increase any stock by 1" },
  { color: "Orange", type: "stock_down", ability: "When gained, decrease any stock by 1" },
  { color: "Orange", type: "hype", ability: "When gained, Orange +1. When sold, Orange -1" },
  { color: "Orange", type: "insider", ability: "When sold, draw an unused Insider Tip Action" },
  { color: "Yellow", type: "blank" },
  { color: "Yellow", type: "blank" },
  { color: "Yellow", type: "blank" },
  { color: "Yellow", type: "blank" },
  { color: "Yellow", type: "stock_up", ability: "When gained, increase any stock by 1" },
  { color: "Yellow", type: "stock_down", ability: "When gained, decrease any stock by 1" },
  { color: "Yellow", type: "hype", ability: "When gained, Yellow +1. When sold, Yellow -1" },
  { color: "Yellow", type: "insider", ability: "When sold, draw an unused Insider Tip Action" },
  { color: "Purple", type: "blank" },
  { color: "Purple", type: "blank" },
  { color: "Purple", type: "blank" },
  { color: "Purple", type: "blank" },
  { color: "Purple", type: "stock_up", ability: "When gained, increase any stock by 1" },
  { color: "Purple", type: "stock_down", ability: "When gained, decrease any stock by 1" },
  { color: "Purple", type: "hype", ability: "When gained, Purple +1. When sold, Purple -1" },
  { color: "Purple", type: "insider", ability: "When sold, draw an unused Insider Tip Action" },
];

const actionCards = [
  { name: "Tipster's Choice", description: "Draw 2 cards from deck, keep 1, return other to bottom", persistent: false },
  { name: "Corner the Market", description: "Take any face-up stock from market for free", persistent: false },
  { name: "Pump and Dump", description: "Sell 1 stock at double its current price immediately", persistent: false },
  { name: "Connected Broker", description: "For rest of game, gain +$1 per stock when you sell", persistent: true },
  { name: "The Squeeze", description: "Increase one stock by +2 OR decrease one stock by -2", persistent: false },
  { name: "Wild Speculation", description: "Flip top card from deck, then increase OR decrease that stock by \u00b13", persistent: false },
  { name: "Preferred Bidder", description: "For rest of game, when you tie the winning bid, you win", persistent: true },
  { name: "Stock Certificate Forgery", description: "Complete any one goal using one fewer card than required", persistent: false },
  { name: "Hostile Takeover", description: "Choose another player, look at their hand, take 1 stock of your choice. They receive $5", persistent: false },
  { name: "Rumor Mill", description: "Adjust every stock by +1 or -1", persistent: false },
];

const crisisCards = [
  { name: "Newspaper Exposé", effect: "+1 End Game Tracker. Remove from game." },
  { name: "Newspaper Exposé", effect: "+1 End Game Tracker. Remove from game." },
];

const goalCards = [
  { id: 1, goal: "2 Blue", reward: "Gain $2", requirements: { Blue: 2 } },
  { id: 2, goal: "2 Orange", reward: "Adjust any one stock by \u00b11", requirements: { Orange: 2 } },
  { id: 3, goal: "2 Yellow", reward: "Set any one stock to exactly $5", requirements: { Yellow: 2 } },
  { id: 4, goal: "2 Purple", reward: "Steal $1 from any one player", requirements: { Purple: 2 } },
  { id: 5, goal: "3 Blue", reward: "Gain $5", requirements: { Blue: 3 } },
  { id: 6, goal: "3 Orange", reward: "Adjust any one stock by \u00b13", requirements: { Orange: 3 } },
  { id: 7, goal: "3 Yellow", reward: "Draw 1 card from the main deck", requirements: { Yellow: 3 } },
  { id: 8, goal: "3 Purple", reward: "Swap a stock card with a face-up market card", requirements: { Purple: 3 } },
  { id: 9, goal: "2 Blue + 2 Orange", reward: "Gain $4", requirements: { Blue: 2, Orange: 2 } },
  { id: 10, goal: "2 Blue + 2 Yellow", reward: "Steal $1 from each other player", requirements: { Blue: 2, Yellow: 2 } },
  { id: 11, goal: "2 Blue + 2 Purple", reward: "Adjust any one stock by \u00b12", requirements: { Blue: 2, Purple: 2 } },
  { id: 12, goal: "2 Orange + 2 Yellow", reward: "Gain $1 per stock card you hold", requirements: { Orange: 2, Yellow: 2 } },
  { id: 13, goal: "2 Orange + 2 Purple", reward: "Draw 2 Type A cards, discard 1", requirements: { Orange: 2, Purple: 2 } },
  { id: 14, goal: "2 Yellow + 2 Purple", reward: "At end of game, gain $5", requirements: { Yellow: 2, Purple: 2 } },
];

const manipulationCards = [
  { id: 1, type: "single_down", text: "Blue -3", parsed: { Blue: -3 } },
  { id: 2, type: "single_down", text: "Orange -3", parsed: { Orange: -3 } },
  { id: 3, type: "single_down", text: "Yellow -3", parsed: { Yellow: -3 } },
  { id: 4, type: "single_down", text: "Purple -3", parsed: { Purple: -3 } },
  { id: 5, type: "double_up", text: "Blue +2 / Orange +1", parsed: { Blue: 2, Orange: 1 } },
  { id: 6, type: "double_up", text: "Orange +2 / Yellow +1", parsed: { Orange: 2, Yellow: 1 } },
  { id: 7, type: "double_up", text: "Yellow +2 / Purple +1", parsed: { Yellow: 2, Purple: 1 } },
  { id: 8, type: "double_up", text: "Purple +2 / Blue +1", parsed: { Purple: 2, Blue: 1 } },
  { id: 9, type: "mixed_up", text: "Blue +2 / Orange -1", parsed: { Blue: 2, Orange: -1 } },
  { id: 10, type: "mixed_up", text: "Orange +2 / Yellow -1", parsed: { Orange: 2, Yellow: -1 } },
  { id: 11, type: "mixed_up", text: "Yellow +2 / Purple -1", parsed: { Yellow: 2, Purple: -1 } },
  { id: 12, type: "mixed_down", text: "Blue -2 / Orange +1", parsed: { Blue: -2, Orange: 1 } },
  { id: 13, type: "mixed_down", text: "Orange -2 / Yellow +1", parsed: { Orange: -2, Yellow: 1 } },
  { id: 14, type: "mixed_down", text: "Yellow -2 / Purple +1", parsed: { Yellow: -2, Purple: 1 } },
];

function renderStockCards() {
    let html = '';
    const colors = ['Blue', 'Orange', 'Yellow', 'Purple'];

    for (const color of colors) {
        const colorCards = stockCards.filter(c => c.color === color);
        html += `<div class="cards-container">`;

        for (const card of colorCards) {
            const abilityText = card.ability || '';
            const abilityClass = abilityText ? '' : 'empty';

            html += `
            <div class="card">
                <div class="card-header">Stock</div>
                <div class="stock-badge">
                    <div class="stock-ticket ${card.color}">
                        <div class="card-color ${card.color}">${card.color}</div>
                    </div>
                </div>
                <div class="card-ability ${abilityClass}">${abilityText}</div>
            </div>`;
        }

        html += '</div>';
    }

    return html;
}

function renderActionCards() {
    let html = '<div class="cards-container">';

    for (const card of actionCards) {
        const tagHtml = card.persistent
            ? '<div class="action-tag">Persistent</div>'
            : card.todo
            ? '<div class="action-tag todo">TODO</div>'
            : '';

        html += `
        <div class="card">
            <div class="card-header">Action</div>
            <div class="action-name">${card.name}</div>
            <div class="action-body">
                <div class="action-desc">${card.description}</div>
                ${tagHtml}
            </div>
        </div>`;
    }

    html += '</div>';
    return html;
}

function renderCrisisCards() {
    let html = '<div class="cards-container">';

    for (const card of crisisCards) {
        html += `
        <div class="card">
            <div class="card-header">Crisis</div>
            <div class="crisis-body">
                <div>
                    <div class="crisis-name">${card.name}</div>
                    <div class="crisis-effect">${card.effect}</div>
                </div>
            </div>
        </div>`;
    }

    html += '</div>';
    return html;
}

function renderManipulationCards() {
    const colorMap = { Blue: '#2980b9', Orange: '#e67e22', Yellow: '#d4a017', Purple: '#8e44ad' };

    let html = '<div class="cards-container">';

    for (const card of manipulationCards) {
        const parts = Object.entries(card.parsed).map(([color, val]) => {
            const sign = val > 0 ? '+' : '';
            return `<span style="color:${colorMap[color]}">${color} ${sign}${val}</span>`;
        });

        html += `
        <div class="card">
            <div class="card-header">Insider Tip Action</div>
            <div class="manipulation-body">
                <div class="manipulation-change">${parts.join('<br>')}</div>
            </div>
        </div>`;
    }

    html += '</div>';
    return html;
}

function renderGoalCards() {
    let html = '<div class="cards-container">';

    for (const card of goalCards) {
        // Build card symbols
        let symbolsHtml = '';
        const colors = Object.entries(card.requirements);
        colors.forEach(([color, count], colorIdx) => {
            if (colorIdx > 0) {
                symbolsHtml += '<span class="goal-plus">+</span>';
            }
            for (let i = 0; i < count; i++) {
                symbolsHtml += `<div class="card-symbol ${color}"></div>`;
            }
        });

        html += `
        <div class="card">
            <div class="card-header">Goal</div>
            <div class="goal-body">
                <div class="goal-cards-row">${symbolsHtml}</div>
                <div class="goal-reward">${card.reward}</div>
            </div>
        </div>`;
    }

    html += '</div>';
    return html;
}

function render() {
    const content = document.getElementById('content');
    let html = '';

    if (document.getElementById('toggle-stock').checked) {
        html += `<div class="section visible">${renderStockCards()}</div>`;
    }
    if (document.getElementById('toggle-action').checked) {
        html += `<div class="section visible">${renderActionCards()}</div>`;
    }
    if (document.getElementById('toggle-crisis').checked) {
        html += `<div class="section visible">${renderCrisisCards()}</div>`;
    }
    if (document.getElementById('toggle-manipulation').checked) {
        html += `<div class="section visible">${renderManipulationCards()}</div>`;
    }
    if (document.getElementById('toggle-goal').checked) {
        html += `<div class="section visible">${renderGoalCards()}</div>`;
    }

    content.innerHTML = html;
}

render();

document.querySelectorAll('.controls input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', render);
});

const params = new URLSearchParams(window.location.search);
const showParam = params.get('show');
if (showParam) {
    const types = showParam.split(',');
    const allToggles = ['stock', 'action', 'crisis', 'manipulation', 'goal'];
    for (const t of allToggles) {
        document.getElementById(`toggle-${t}`).checked = types.includes(t);
    }
    render();
}
</script>

</body>
</html>
